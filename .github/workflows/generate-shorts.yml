name: Generate Shorts

on:
  schedule:
    # Runs daily at 06:00 UTC (03:00 BRT)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      video_urls:
        description: "Comma-separated YouTube video URLs (optional, overrides channel scan)"
        required: false
        type: string
      days_back:
        description: "Number of days back to fetch videos"
        required: false
        default: "1"
        type: string
      channels:
        description: "Comma-separated channel handles (optional, overrides env var)"
        required: false
        type: string

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  YOUTUBE_CHANNELS: ${{ vars.YOUTUBE_CHANNELS }}
  OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL || 'qwen3-vl:4b' }}
  WHISPER_MODEL: ${{ vars.WHISPER_MODEL || 'base' }}
  DAYS_BACK: ${{ github.event.inputs.days_back || vars.DAYS_BACK || '1' }}
  VIDEO_URLS: ${{ github.event.inputs.video_urls || '' }}
  OUTPUT_DIR: ./output
  PIP_CACHE_DIR: ~/.cache/pip
  WHISPER_CACHE_DIR: ~/.cache/whisper
  OLLAMA_MODELS_DIR: ~/.ollama/models
  YOUTUBE_COOKIES_BASE64: ${{ secrets.YOUTUBE_COOKIES_BASE64 }}

jobs:
  generate:
    name: Generate YouTube Shorts
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: ${{ env.PIP_CACHE_DIR }}
          key: ${{ runner.os }}-pip-py311-openai-whisper-yt-dlp-v1
          restore-keys: |
            ${{ runner.os }}-pip-py311-

      - name: Cache Whisper model files
        uses: actions/cache@v4
        with:
          path: ${{ env.WHISPER_CACHE_DIR }}
          key: ${{ runner.os }}-whisper-${{ env.WHISPER_MODEL }}
          restore-keys: |
            ${{ runner.os }}-whisper-

      - name: Cache Ollama model files
        id: ollama-cache
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ${{ env.OLLAMA_MODELS_DIR }}
          key: ${{ runner.os }}-ollama-${{ env.OLLAMA_MODEL }}
          restore-keys: |
            ${{ runner.os }}-ollama-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          python -m pip install yt-dlp yt-dlp-ejs openai-whisper

      - name: Install & start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull ${{ env.OLLAMA_MODEL }}
          ollama list

      - name: Verify tools
        run: |
          node --version
          ffmpeg -version | head -1
          yt-dlp --version
          whisper --help | head -3
          ollama --version

      - name: Override channels (if provided)
        if: ${{ github.event.inputs.channels }}
        run: echo "YOUTUBE_CHANNELS=${{ github.event.inputs.channels }}" >> $GITHUB_ENV

      - name: Run shorts generation
        run: pnpm run generate

      - name: Upload generated shorts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shorts-${{ github.run_id }}
          path: output/**/*.mp4
          retention-days: 7
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: rm -rf output/temp
